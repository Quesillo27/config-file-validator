# Ejemplo de schema para archivos .env de una app Node.js/Express
required:
  - DATABASE_URL
  - JWT_SECRET
  - PORT
  - NODE_ENV

no_empty_values: true

forbidden:
  - AWS_ROOT_ACCESS_KEY
  - MASTER_KEY

patterns:
  PORT: '^\d+$'
  NODE_ENV: '^(development|production|test)$'
  DATABASE_URL: '^postgres(ql)?://'

allowed_keys:
  - DATABASE_URL
  - JWT_SECRET
  - PORT
  - NODE_ENV
  - REDIS_URL
  - LOG_LEVEL
  - CORS_ORIGINS
